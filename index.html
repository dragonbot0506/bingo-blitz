<!DOCTYPE html>
<html>
<head>
  <title>PIngo</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0;
      margin-bottom: 24px;
    }

    .logo-p {
      font-size: 56px;
      font-weight: 900;
      color: #1a1a2e;
      letter-spacing: -2px;
    }

    .logo-palm {
      font-size: 52px;
      line-height: 1;
      margin: 0 -2px;
    }

    .logo-ngo {
      font-size: 40px;
      font-weight: 400;
      color: #1a1a2e;
      letter-spacing: -1px;
    }

    .logo-tagline {
      font-size: 13px;
      color: #888;
      margin-top: -18px;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    input {
      padding: 10px;
      margin-bottom: 10px;
      display: block;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="logo">
  <span class="logo-p">P</span><span class="logo-palm">🌴</span><span class="logo-ngo">ngo</span>
</div>
<p class="logo-tagline">PARTY BINGO</p>

<h2>Create Room</h2>

<input id="name" placeholder="Your Name">
<input id="password" placeholder="Room Password">

<button onclick="handleCreateRoom()">Create Room</button>

<p id="result"></p>

<script>
const API_URL = "https://bingo-blitz-production.up.railway.app";

// =======================
// PROMPTS (ALWAYS VALID)
// =======================
function generatePrompts() {
    const arr = [];
    for (let i = 1; i <= 25; i++) {
        arr.push("Prompt " + i);
    }
    return arr;
}

// =======================
// CREATE ROOM
// =======================
async function handleCreateRoom() {
    const result = document.getElementById("result");

    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;

    if (!name || !password) {
        result.innerText = "Missing name or password";
        return;
    }

    const payload = {
        password,
        gridSize: 5,
        prompts: generatePrompts(),
        arbiterId: "host",
        arbiterName: name
    };

    console.log("SENDING:", payload);

    try {
        const res = await fetch(`${API_URL}/api/rooms`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        console.log("RESPONSE:", data);

        if (!res.ok) {
            result.innerText = data.error || "Server error";
            return;
        }

        result.innerText = "Room Code: " + data.roomCode;

    } catch (err) {
        console.error(err);
        result.innerText = "Server connection failed";
    }
}
</script>

</body>
</html>
