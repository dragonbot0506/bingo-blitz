<!DOCTYPE html>
<html>
<head>
  <title>PIngo</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0;
      margin-bottom: 24px;
    }

    .logo-p {
      font-size: 56px;
      font-weight: 900;
      color: #1a1a2e;
      letter-spacing: -2px;
    }

    .logo-palm {
      font-size: 52px;
      line-height: 1;
      margin: 0 -2px;
    }

    .logo-ngo {
      font-size: 40px;
      font-weight: 400;
      color: #1a1a2e;
      letter-spacing: -1px;
    }

    .logo-tagline {
      font-size: 13px;
      color: #888;
      margin-top: -18px;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    input {
      padding: 10px;
      margin-bottom: 10px;
      display: block;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    #phone-boxes {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }

    #digits {
      display: flex;
      gap: 5px;
    }

    .digit {
      width: 35px;
      height: 45px;
      font-size: 20px;
      text-align: center;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="logo">
  <span class="logo-p">P</span><span class="logo-palm">🌴</span><span class="logo-ngo">ngo</span>
</div>
<p class="logo-tagline">PARTY BINGO</p>

<h2>Create Room</h2>

<input id="name" placeholder="Your Name">
<input id="password" placeholder="Room Password">

<p>Your Phone (for SMS)</p>

<div id="phone-boxes">
  <span>+1</span>
  <div id="digits"></div>
</div>

<button onclick="handleCreateRoom()">Create Room</button>

<p id="result"></p>

<script>
const API_URL = "https://bingo-blitz-production.up.railway.app";

// =======================
// 🔥 CREATE 10 DIGIT BOXES
// =======================
const digitContainer = document.getElementById("digits");
const digitInputs = [];

for (let i = 0; i < 10; i++) {
    const input = document.createElement("input");
    input.className = "digit";
    input.maxLength = 1;

    input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "");

        if (input.value && digitInputs[i + 1]) {
            digitInputs[i + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && digitInputs[i - 1]) {
            digitInputs[i - 1].focus();
        }
    });

    digitInputs.push(input);
    digitContainer.appendChild(input);
}

// focus first box
digitInputs[0].focus();

// =======================
// 🔥 BUILD PHONE
// =======================
function getPhoneSlots() {
    const digits = digitInputs.map(i => i.value).join("");

    if (digits.length !== 10) return null;

    return {
        area: digits.slice(0, 3),
        prefix: digits.slice(3, 6),
        line: digits.slice(6)
    };
}

// =======================
// 🔥 PROMPTS (ALWAYS VALID)
// =======================
function generatePrompts() {
    const arr = [];
    for (let i = 1; i <= 25; i++) {
        arr.push("Prompt " + i);
    }
    return arr;
}

// =======================
// 🔥 CREATE ROOM
// =======================
async function handleCreateRoom() {
    const result = document.getElementById("result");

    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;
    const phoneSlots = getPhoneSlots();

    if (!name || !password) {
        result.innerText = "Missing name or password";
        return;
    }

    if (!phoneSlots) {
        result.innerText = "Enter full phone number";
        return;
    }

    const payload = {
        password,
        gridSize: 5,
        prompts: generatePrompts(),
        arbiterId: "host",
        arbiterName: name,
        arbiterPhoneSlots: phoneSlots
    };

    console.log("SENDING:", payload);

    try {
        const res = await fetch(`${API_URL}/api/rooms`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        console.log("RESPONSE:", data);

        if (!res.ok) {
            result.innerText = data.error || "Server error";
            return;
        }

        result.innerText = "Room Code: " + data.roomCode;

    } catch (err) {
        console.error(err);
        result.innerText = "Server connection failed";
    }
}
</script>

</body>
</html>
